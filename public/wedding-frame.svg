<!--
  wedding-frame.svg
  viewBox: 0 0 100 150  (2:3 portrait, same as FrameDecoration.tsx)
  좌표 규칙: x 0~100 (%), y 0~150 (150 unit = 100% height)
  囍 medallion: center (50, 14), r=9
  囍 path: Noto Serif CJK SC Bold U+56CD, 0~100 정규화, y-down 반전 완료
  SONGHY_SCALE = (9 * 2 * 0.62) / 100 = 0.1116
  translate = (50 - 100*0.1116/2, 14 - 100*0.1116/2) = (44.42, 8.42)
-->
